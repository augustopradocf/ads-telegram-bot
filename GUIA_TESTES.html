<!-- 
  COMPORTAMENTO ESPERADO
  
  1. Primeira vez que abre o site:
     - 10 produtos padrão aparecem
     - Nenhum cliente ou loja cadastrados
  
  2. Após criar cliente:
     - Cliente aparece na lista
     - Login funciona com email/senha
     - Sessão é mantida ao recarregar
  
  3. Ao fazer pedido:
     - Pedido aparece em "Meus Pedidos"
     - Status inicial é "Pendente"
     - Pontos são acumulados
  
  4. Ao atualizar status (proprietário):
     - Status muda imediatamente
     - Timeline mostra novo status
     - Cliente vê atualização
  
  5. Ao usar pontos:
     - Pontos são deduzidos
     - Desconto é aplicado
     - Desconto aparece no total
-->
